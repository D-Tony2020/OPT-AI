  var ph = PHASE[d.phase];

  cy.elements().forEach(function(ele) { ele.removeClass('highlighted selected-node dimmed'); });
  var node = cy.getElementById(id);
  var neighborhood = node.neighborhood();
  cy.elements().addClass('dimmed');
  neighborhood.removeClass('dimmed').addClass('highlighted');
  neighborhood.edges().addClass('highlighted');
  node.removeClass('dimmed').addClass('selected-node');

  var html = '';
  html += '<div class="panel-lecture" style="color:' + ph.color + '">' + d.lecture + ' \u2014 ' + ph.label + ' ' + ph.labelCn + '</div>';
  html += '<div class="panel-title" style="background:linear-gradient(135deg,' + ph.color + ',#e0e6f0);-webkit-background-clip:text;-webkit-text-fill-color:transparent">' + d.title + '</div>';
  html += '<div class="panel-title-cn">' + d.titleCn + '</div>';
  html += '<div class="panel-sub">' + d.sub + '</div>';
  html += '<div class="panel-sub-cn">' + d.subCn + '</div>';

  if (d.formulas && d.formulas.length) {
    html += '<div class="section"><h3>Core Formulas \u6838\u5fc3\u516c\u5f0f</h3>';
    for (var i = 0; i < d.formulas.length; i++) {
      html += '<div class="formula-box">' + d.formulas[i] + '</div>';
    }
    html += '</div>';
  }

  if (d.points && d.points.length) {
    html += '<div class="section"><h3>Key Points \u8981\u70b9</h3><ul>';
    for (var i = 0; i < d.points.length; i++) {
      var p = d.points[i];
      if (Array.isArray(p)) {
        html += '<li>' + p[0] + '<span class="cn">' + p[1] + '</span></li>';
      } else {
        html += '<li>' + p + '</li>';
      }
    }
    html += '</ul></div>';
  }

  var conns = [];
  edges.forEach(function(e) {
    if (e.data.source === id && DATA[e.data.target]) {
      conns.push({ id: e.data.target, dir: '\u2192', title: DATA[e.data.target].title, titleCn: DATA[e.data.target].titleCn });
    }
    if (e.data.target === id && DATA[e.data.source]) {
      conns.push({ id: e.data.source, dir: '\u2190', title: DATA[e.data.source].title, titleCn: DATA[e.data.source].titleCn });
    }
  });
  if (conns.length) {
    html += '<div class="section"><h3>Connections \u5173\u8054 (' + conns.length + ')</h3><div class="conn-tags">';
    for (var i = 0; i < conns.length; i++) {
      html += '<span class="conn-tag" data-goto="' + conns[i].id + '">' + conns[i].dir + ' ' + conns[i].title + ' ' + conns[i].titleCn + '</span>';
    }
    html += '</div></div>';
  }

  if (d.tags && d.tags.length) {
    html += '<div class="section"><h3>Keywords \u5173\u952e\u8bcd</h3><div class="conn-tags">';
    for (var i = 0; i < d.tags.length; i++) {
      html += '<span class="conn-tag" style="cursor:default">' + d.tags[i] + '</span>';
    }
    html += '</div></div>';
  }

  panelContent.innerHTML = html;
  panel.classList.add('open');

  var tags = panelContent.querySelectorAll('.conn-tag[data-goto]');
  for (var i = 0; i < tags.length; i++) {
    tags[i].addEventListener('click', function() {
      var target = this.getAttribute('data-goto');
      cy.animate({ center: { eles: cy.getElementById(target) }, duration: 400 });
      setTimeout(function() { openPanel(target); }, 200);
    });
  }
}

function closePanel() {
  panel.classList.remove('open');
  cy.elements().forEach(function(ele) { ele.removeClass('highlighted selected-node dimmed'); });
}

cy.on('tap', 'node', function(evt) { openPanel(evt.target.id()); });
cy.on('tap', function(evt) { if (evt.target === cy) closePanel(); });
document.getElementById('panelClose').addEventListener('click', closePanel);
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closePanel(); });

// ============================================================
//  ZOOM CONTROLS
// ============================================================
document.getElementById('zoomIn').addEventListener('click', function() {
  cy.zoom({ level: cy.zoom() * 1.3, renderedPosition: { x: cy.width()/2, y: cy.height()/2 } });
});
document.getElementById('zoomOut').addEventListener('click', function() {
  cy.zoom({ level: cy.zoom() / 1.3, renderedPosition: { x: cy.width()/2, y: cy.height()/2 } });
});
document.getElementById('zoomFit').addEventListener('click', function() {
  cy.animate({ fit: { padding: 60 }, duration: 400 });
});

// ============================================================
//  HOVER
// ============================================================
cy.on('mouseover', 'node', function(evt) {
  evt.target.style('border-width', 3);
  document.getElementById('cy').style.cursor = 'pointer';
});
cy.on('mouseout', 'node', function(evt) {
  if (!evt.target.hasClass('selected-node')) evt.target.style('border-width', 2);
  document.getElementById('cy').style.cursor = 'default';
});
</script>
</body>
</html>
